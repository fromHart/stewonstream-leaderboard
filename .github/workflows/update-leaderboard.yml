name: Update Leaderboard

on:
  schedule:
    - cron: '*/15 * * * *'  # every 15 minutes
  workflow_dispatch:        # allows manual trigger from the Actions tab

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install requests

      - name: Fetch leaderboard data
        env:
          STEAM_API_KEY:        ${{ secrets.STEAM_API_KEY }}
          STEAM_APP_ID:         ${{ secrets.STEAM_APP_ID }}
          LEADERBOARD_ID_DEAD:  ${{ secrets.LEADERBOARD_ID_DEAD }}
          LEADERBOARD_ID_ALIVE: ${{ secrets.LEADERBOARD_ID_ALIVE }}
        run: python scripts/fetch_leaderboard.py

      - name: Commit and push if changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/leaderboard.json
          git diff --staged --quiet || git commit -m "chore: update leaderboard data"
          git push
